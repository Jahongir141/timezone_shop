{% extends "base.html" %}
{% block title %}Reset Password | TimeZone{% endblock %}
{% block content %}
<section class="tz-section">
    <div class="container">
        <div class="tz-auth-card mx-auto">
            <h2 class="text-center mb-4">Reset Your Password</h2>
            <p class="text-muted text-center">Enter your email and we'll send you instructions to reset your password.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn tz-btn-primary w-100">Send Reset Link</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}

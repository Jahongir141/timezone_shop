<div class="col-sm-6 col-md-4 col-lg-3">
    <div class="tz-card h-100">
        <a href="{% url 'watch_detail' watch.slug %}" class="tz-card-img-link">
            <img src="{{ watch.image.url }}" alt="{{ watch.title }}" class="tz-card-img">
        </a>
        <div class="tz-card-body">
            <span class="tz-card-brand">{{ watch.brand }}</span>
            <h6 class="tz-card-title">
                <a href="{% url 'watch_detail' watch.slug %}">{{ watch.title }}</a>
            </h6>
            <div class="tz-card-footer">
                <span class="tz-card-price">${{ watch.price }}</span>
                <a href="{% url 'watch_detail' watch.slug %}" class="btn btn-sm tz-btn-primary">
                    <i class="bi bi-bag-check"></i> Buy
                </a>
            </div>
        </div>
    </div>
</div>

{% extends "base.html" %}
{% block title %}Categories | TimeZone{% endblock %}
{% block content %}
<section class="tz-page-header">
    <div class="container"><h1>Browse Categories</h1></div>
</section>
<section class="tz-section">
    <div class="container">
        <div class="row g-4">
            {% for cat in categories %}
            <div class="col-sm-6 col-md-4">
                <a href="{% url 'category_detail' cat.slug %}" class="tz-cat-card">
                    <i class="bi bi-watch"></i>
                    <h5>{{ cat.name }}</h5>
                    <span>{{ cat.watches.count }} watches</span>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
